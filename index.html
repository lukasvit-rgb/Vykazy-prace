<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>Výkazy práce — Palety Vít</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1a1a;--bg2:#222;--bg3:#2a2a2a;--bg4:#333;
  --border:#3a3a3a;--white:#f0f0f0;--dim:#888;--muted:#444;
  --green:#5dbb6a;--red:#e05555;--yellow:#f0b429;--blue:#4a9eff;
  --tridirna:#f0b429;--opravna:#4a9eff;--sklad:#5dbb6a;--dovolena:#e05555;
  --hh:58px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:100px;touch-action:manipulation}

/* HEADER */
.header{height:var(--hh);background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo{display:flex;flex-direction:column;line-height:1}
.logo-top{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;letter-spacing:5px;color:var(--white)}
.logo-bot{display:flex;gap:10px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;letter-spacing:5px;color:var(--white)}
.logo-div{width:1px;height:32px;background:var(--border)}
.logo-sub{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}
.hdate{text-align:right;font-size:11px;color:var(--dim);line-height:1.6}
.offline-badge{display:none;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;padding:3px 8px;border-radius:4px}
body.offline .offline-badge{display:inline-block}
.sync-pending{display:none;background:var(--yellow);color:#1a1a1a;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;padding:3px 8px;border-radius:4px}
.sync-pending.on{display:inline-block}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:var(--hh);z-index:90}
.tab{flex:1;padding:12px 4px;background:none;border:none;border-bottom:2px solid transparent;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:all .12s}
.tab.on{color:var(--white);border-bottom-color:var(--white)}

/* SCREENS */
.screen{display:none;padding:12px 12px 20px}
.screen.on{display:block}

/* SEC LABEL */
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);padding:12px 0 6px}

/* WORKER SELECT */
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.wbtn{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .12s}
.wbtn.on{border-color:var(--white);background:var(--bg3)}
.wbtn:active{transform:scale(.97)}
.wdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.wname{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700}

/* BLOCKS */
.block{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;position:relative}
.block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.block-num{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.block-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:6px}
.block-del:active{background:var(--bg3);color:var(--red)}

/* STREDISKO TOGGLE */
.stred-seg{display:flex;gap:6px;margin-bottom:12px}
.stred-btn{flex:1;padding:11px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--dim);cursor:pointer;text-align:center;transition:all .12s}
.stred-btn.on-trid{background:#2a2200;color:var(--tridirna);border-color:var(--tridirna)}
.stred-btn.on-opr{background:#0d1f35;color:var(--opravna);border-color:var(--opravna)}
.stred-btn.on-sklad{background:#0d2a0d;color:var(--sklad);border-color:var(--sklad)}

/* TIME ROW */
.time-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.time-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dim);width:28px;flex-shrink:0}
.time-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;padding:10px 12px;text-align:center;outline:none;transition:border-color .12s}
.time-inp:focus{border-color:var(--white)}
.time-sep{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--dim)}

/* KS INPUT */
.ks-row{display:flex;align-items:center;gap:8px}
.ks-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dim);flex:1}
.ks-inp{width:90px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;padding:9px 12px;text-align:center;outline:none;-moz-appearance:textfield}
.ks-inp::-webkit-outer-spin-button,.ks-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.ks-inp:focus{border-color:var(--white)}

/* PALLET GRID IN BLOCK */
.pgrid-block{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.pbtn-block{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 6px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--dim);cursor:pointer;text-align:center;transition:all .12s}
.pbtn-block.on{background:var(--bg4);color:var(--white);border-color:var(--white)}
.pbtn-block:active{transform:scale(.97)}

/* ADD BLOCK BTN */
.add-block-btn{width:100%;padding:12px;background:var(--bg2);border:1px dashed var(--border);border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);cursor:pointer;margin-bottom:12px;transition:all .12s}
.add-block-btn:active{background:var(--bg3);color:var(--white)}

/* NOTE */
.note-inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;padding:12px 14px;outline:none;resize:none;transition:border-color .12s}
.note-inp:focus{border-color:var(--white)}

/* SUMMARY BOX */
.summary{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:none}
.summary.on{display:block}
.sum-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none;padding-top:8px;margin-top:4px}
.sum-lbl{font-size:13px;color:var(--dim)}
.sum-val{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700}
.sum-val.trid{color:var(--tridirna)}
.sum-val.opr{color:var(--opravna)}
.sum-val.total{color:var(--white);font-size:17px}

/* SUBMIT BTN */
.submit-btn{width:100%;padding:16px;background:var(--white);color:#1a1a1a;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .12s}
.submit-btn:active{opacity:.85}
.submit-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}

/* HISTORY */
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.hist-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hist-who{display:flex;align-items:center;gap:8px}
.hist-dot{width:10px;height:10px;border-radius:50%}
.hist-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700}
.hist-date{font-size:11px;color:var(--dim)}
.hist-blocks{display:flex;flex-direction:column;gap:4px}
.hist-block{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px}
.hist-block.trid{background:#2a2200}
.hist-block.opr{background:#0d1f35}
.hist-stred{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:1px;width:80px;flex-shrink:0}
.hist-stred.trid{color:var(--tridirna)}
.hist-stred.opr{color:var(--opravna)}
.hist-time{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--dim);flex:1}
.hist-ks{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800}
.hist-note{font-size:11px;color:var(--dim);font-style:italic;margin-top:6px}
.hist-footer{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.hist-total{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--dim)}
.hist-del{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px}
.hist-del:active{color:var(--red)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}

/* TOAST */
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);background:var(--green);color:#0a1a0a;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;padding:11px 22px;border-radius:8px;z-index:300;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo">
      <div class="logo-top">PALETY</div>
      <div class="logo-bot"><span>VÍ</span><span>T</span></div>
    </div>
    <div class="logo-div"></div>
    <div class="logo-sub">Výkazy</div>
    <span class="offline-badge">OFFLINE</span>
    <span class="sync-pending" id="sync-pending">⟳ sync</span>
  </div>
  <div class="hdate" id="hdate"></div>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('zadani',this)">✏️ Zadat výkaz</button>
  <button class="tab" onclick="switchTab('historie',this)">📋 Historie</button>
</div>

<!-- ZADÁNÍ -->
<div class="screen on" id="screen-zadani">

  <div class="sec-lbl">Pracovník</div>
  <div class="wgrid" id="wgrid"></div>

  <div class="sec-lbl">Bloky práce</div>
  <div id="dovolena-wrap" style="display:none;margin-bottom:8px">
    <div style="background:#2a0d0d;border:1px solid var(--dovolena);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--dovolena)">🏖️ DOVOLENÁ</div>
        <div style="font-size:12px;color:var(--dim);margin-top:2px">Celý den — 8 h odečteno</div>
      </div>
      <button onclick="cancelDovolena()" style="background:none;border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--dim);cursor:pointer">✕ Zrušit</button>
    </div>
  </div>
  <div id="blocks"></div>
  <button class="add-block-btn" id="add-block-btn" onclick="addBlock()">+ Přidat blok práce</button>
  <button class="add-block-btn" id="dovolena-btn" onclick="setDovolena()" style="border-color:#e05555;color:var(--dovolena)">🏖️ Zadat dovolenou</button>

  <div class="sec-lbl">Shrnutí směny</div>
  <div class="summary" id="summary">
    <div class="sum-row">
      <span class="sum-lbl">🟡 Třídírna</span>
      <span class="sum-val trid" id="sum-trid">0 h 0 min</span>
    </div>
    <div class="sum-row">
      <span class="sum-lbl">🔵 Opravna</span>
      <span class="sum-val opr" id="sum-opr">0 h 0 min</span>
    </div>
    <div class="sum-row" id="sum-sklad-row" style="display:none">
      <span class="sum-lbl">🟢 Sklad (VZV)</span>
      <span class="sum-val" style="color:var(--sklad)" id="sum-sklad">0 h 0 min</span>
    </div>
    <div class="sum-row">
      <span class="sum-lbl">☕ Přestávka (auto)</span>
      <span class="sum-val" style="color:var(--dim)">−30 min</span>
    </div>
    <div class="sum-row">
      <span class="sum-lbl" style="color:var(--white);font-weight:600">Celkem odpracováno</span>
      <span class="sum-val total" id="sum-total">0 h 0 min</span>
    </div>
  </div>

  <div class="sec-lbl">Poznámka</div>
  <textarea class="note-inp" id="note" rows="2" placeholder="Nepovinná poznámka ke směně…" maxlength="200"></textarea>

  <div style="height:12px"></div>
  <button class="submit-btn" id="submit-btn" onclick="submitVykaz()" disabled>✓ Odeslat výkaz</button>
</div>

<!-- HISTORIE -->
<div class="screen" id="screen-historie">
  <div id="hist-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKERS = [
  {name:'Radek',  color:'#2ecc40'},
  {name:'Laďa',   color:'#f5c842'},
  {name:'Martin', color:'#ffffff'},
  {name:'Zavadil',color:'#4a9eff'},
  {name:'Honza',  color:'#9b59b6'},
];

const SHEETS_URL = 'https://script.google.com/macros/s/PLACEHOLDER/exec';
const PALLETS = ['EUR A','EUR B - lis.','EUR B - dřevo','STD05','STD10','STD15','100x120','100x120 rámové','Atypická'];

let selWorker = null;
let isDovolena = false;
let blocks = []; // [{stredisko, od, do, ks}]
let vykazy = JSON.parse(localStorage.getItem('vykazy') || '[]');

function getVykazy() {
  return window._vykazy || vykazy;
}

// DATE
const ck = () => {
  const d = new Date();
  document.getElementById('hdate').innerHTML =
    `<div>${d.toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'})}</div>
     <div>${d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'})}</div>`;
};
ck(); setInterval(ck, 30000);

// TABS
function switchTab(id, btn) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('screen-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='historie') renderHistorie();
}

// WORKERS
function renderWorkers() {
  document.getElementById('wgrid').innerHTML = WORKERS.map((w,i) => `
    <button class="wbtn${selWorker===i?' on':''}" onclick="pickWorker(${i})">
      <div class="wdot" style="background:${w.color}"></div>
      <span class="wname" style="color:${w.color}">${w.name}</span>
    </button>`).join('');
}

function pickWorker(i) {
  selWorker = i;
  renderWorkers();
  renderBlocks();
  validateForm();
}

// BLOCKS
function addBlock() {
  blocks.push({stredisko: null, od: '', do: '', ks: 0, palletQty: {}});
  renderBlocks();
}

function removeBlock(i) {
  blocks.splice(i, 1);
  renderBlocks();
  calcSummary();
}

function renderBlocks() {
  document.getElementById('blocks').innerHTML = blocks.map((b, i) => `
    <div class="block">
      <div class="block-header">
        <span class="block-num">Blok ${i+1}</span>
        ${blocks.length > 1 ? `<button class="block-del" onclick="removeBlock(${i})">✕</button>` : ''}
      </div>

      <div class="stred-seg" style="${selWorker===2?'grid-template-columns:1fr 1fr 1fr;display:grid;':''}">
        <button class="stred-btn${b.stredisko==='tridirna'?' on-trid':''}" onclick="setStred(${i},'tridirna')">🟡 Třídírna</button>
        <button class="stred-btn${b.stredisko==='opravna'?' on-opr':''}" onclick="setStred(${i},'opravna')">🔵 Opravna</button>
        ${selWorker===2?`<button class="stred-btn${b.stredisko==='sklad'?' on-sklad':''}" onclick="setStred(${i},'sklad')">🟢 Sklad</button>`:''}
      </div>

      <div class="time-row">
        <span class="time-lbl">Od</span>
        <input class="time-inp" type="time" value="${b.od}" onchange="setBlockVal(${i},'od',this.value)" oninput="setBlockVal(${i},'od',this.value)">
        <span class="time-sep">→</span>
        <input class="time-inp" type="time" value="${b.do}" onchange="setBlockVal(${i},'do',this.value)" oninput="setBlockVal(${i},'do',this.value)">
      </div>

      ${b.stredisko === 'tridirna' ? `
      <div class="ks-row">
        <span class="ks-lbl">Počet tříděných palet</span>
        <input class="ks-inp" type="number" placeholder="0" value="${b.ks||''}" min="0" inputmode="numeric"
               onchange="setBlockVal(${i},'ks',this.value)" oninput="setBlockVal(${i},'ks',this.value)">
      </div>
      ` : b.stredisko === 'opravna' ? `
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px">Typy palet</div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:10px">
        ${PALLETS.map((p,pi) => `
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--dim);flex:1">${p}</span>
            <input class="ks-inp" type="number" placeholder="0" min="0" inputmode="numeric"
              value="${(b.palletQty&&b.palletQty[pi])||''}"
              style="width:70px;font-size:18px;padding:7px 8px"
              oninput="setPalletQty(${i},${pi},this.value)">
          </div>
          ${p==='Atypická' ? `<input class="note-inp" type="text" placeholder="Popis atypické palety…" maxlength="100"
            value="${b.atypickaNote||''}"
            style="margin-top:4px;margin-bottom:2px;font-size:14px;padding:8px 12px"
            oninput="setBlockAtypNote(${i},this.value)">` : ''}`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border-radius:7px;padding:9px 12px">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--dim)">Celkem opraveno</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--white)">${Object.values(b.palletQty||{}).reduce((s,v)=>s+(parseInt(v)||0),0)} ks</span>
      </div>
      ` : b.stredisko === 'sklad' ? `
      <div class="ks-row">
        <span class="ks-lbl">Počet přepravených palet (VZV)</span>
        <input class="ks-inp" type="number" placeholder="0" value="${b.ks||''}" min="0" inputmode="numeric"
               onchange="setBlockVal(${i},'ks',this.value)" oninput="setBlockVal(${i},'ks',this.value)">
      </div>` : ''}
    </div>`).join('');
  validateForm();
}

function setStred(i, val) {
  blocks[i].stredisko = val;
  renderBlocks();
  calcSummary();
}

function setBlockAtypNote(i, val) {
  blocks[i].atypickaNote = val;
}

function setPalletQty(i, pi, val) {
  if(!blocks[i].palletQty) blocks[i].palletQty = {};
  blocks[i].palletQty[pi] = parseInt(val) || 0;
  // Update total ks
  blocks[i].ks = Object.values(blocks[i].palletQty).reduce((s,v)=>s+(parseInt(v)||0),0);
  // Re-render only the total span without full re-render
  validateForm();
  calcSummary();
  // Update total display inline
  const blockEls = document.getElementById('blocks').querySelectorAll('[data-block-total]');
}

function setBlockVal(i, key, val) {
  blocks[i][key] = val;
  calcSummary();
  validateForm();
}

// SUMMARY CALC
function parseTime(t) {
  if(!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function fmtMins(mins) {
  if(mins < 0) mins = 0;
  return `${Math.floor(mins/60)} h ${mins%60} min`;
}

function calcSummary() {
  let tridMins = 0, oprMins = 0, skladMins = 0;
  let valid = false;
  blocks.forEach(b => {
    if(!b.od || !b.do || !b.stredisko) return;
    const od = parseTime(b.od), doo = parseTime(b.do);
    if(od === null || doo === null) return;
    const diff = doo > od ? doo - od : 0;
    if(diff > 0) {
      valid = true;
      if(b.stredisko === 'tridirna') tridMins += diff;
      else if(b.stredisko === 'sklad') skladMins += diff;
      else oprMins += diff;
    }
  });

  if(!valid) { document.getElementById('summary').classList.remove('on'); return; }
  document.getElementById('summary').classList.add('on');

  const totalRaw = tridMins + oprMins + skladMins;
  const totalNet = Math.max(0, totalRaw - 30);

  document.getElementById('sum-trid').textContent = fmtMins(tridMins);
  document.getElementById('sum-opr').textContent = fmtMins(oprMins);
  document.getElementById('sum-sklad').textContent = fmtMins(skladMins);
  document.getElementById('sum-sklad-row').style.display = skladMins > 0 ? 'flex' : 'none';
  document.getElementById('sum-total').textContent = fmtMins(totalNet);
}

function validateForm() {
  const ok = selWorker !== null &&
    (isDovolena || (blocks.length > 0 && blocks.some(b => b.stredisko && b.od && b.do)));
  document.getElementById('submit-btn').disabled = !ok;
}

// DOVOLENA
function setDovolena() {
  isDovolena = true;
  blocks = [];
  document.getElementById('dovolena-wrap').style.display = 'block';
  document.getElementById('add-block-btn').style.display = 'none';
  document.getElementById('dovolena-btn').style.display = 'none';
  document.getElementById('blocks').innerHTML = '';
  document.getElementById('summary').classList.remove('on');
  validateForm();
}

function cancelDovolena() {
  isDovolena = false;
  document.getElementById('dovolena-wrap').style.display = 'none';
  document.getElementById('add-block-btn').style.display = 'block';
  document.getElementById('dovolena-btn').style.display = 'block';
  addBlock();
  validateForm();
}

// SUBMIT
function submitVykaz() {
  if(selWorker === null) return;
  const note = document.getElementById('note').value.trim();
  const d = new Date();
  const date = d.toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'});
  const time = d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});

  let tridMins = 0, oprMins = 0, skladMins = 0;
  blocks.forEach(b => {
    if(!b.od || !b.do || !b.stredisko) return;
    const od = parseTime(b.od), doo = parseTime(b.do);
    const diff = doo > od ? doo - od : 0;
    if(b.stredisko === 'tridirna') tridMins += diff;
    else if(b.stredisko === 'sklad') skladMins += diff;
    else oprMins += diff;
  });
  const totalNet = Math.max(0, tridMins + oprMins + skladMins - 30);

  const rec = {
    id: Date.now()+'-'+Math.random().toString(36).substr(2,5),
    ts: d.toISOString(),
    date, time,
    worker: selWorker,
    workerName: WORKERS[selWorker].name,
    workerColor: WORKERS[selWorker].color,
    isDovolena,
    blocks: isDovolena ? [] : blocks.filter(b => b.stredisko && b.od && b.do).map(b=>({...b})),
    tridMins: isDovolena ? 0 : tridMins,
    oprMins: isDovolena ? 0 : oprMins,
    skladMins: isDovolena ? 0 : skladMins,
    totalNet: isDovolena ? 480 : totalNet,
    note,
  };

  vykazy.unshift(rec);
  localStorage.setItem('vykazy', JSON.stringify(vykazy.slice(0, 200)));

  // Firebase save
  if (window.saveToFirebase) {
    window.saveToFirebase(rec);
  }

  // Sheets sync
  if (navigator.onLine) {
    const encoded = encodeURIComponent(JSON.stringify(rec));
    const img = new Image();
    img.src = SHEETS_URL + '?data=' + encoded;
  } else {
    pendingSync.push(rec);
    localStorage.setItem('vykazy_pending', JSON.stringify(pendingSync));
    updateSyncBadge();
  }

  // Reset form
  selWorker = null;
  blocks = [];
  isDovolena = false;
  document.getElementById('note').value = '';
  document.getElementById('summary').classList.remove('on');
  document.getElementById('dovolena-wrap').style.display = 'none';
  document.getElementById('add-block-btn').style.display = 'block';
  document.getElementById('dovolena-btn').style.display = 'block';
  renderWorkers();
  renderBlocks();
  document.getElementById('submit-btn').disabled = true;

  toast('✓ Výkaz odeslán!');
}

// HISTORIE
function renderHistorie() {
  const el = document.getElementById('hist-list');
  const vykazy = getVykazy();
  if(!vykazy.length) { el.innerHTML = '<div class="empty">Žádné výkazy zatím.</div>'; return; }
  el.innerHTML = vykazy.map(v => `
    <div class="hist-item">
      <div class="hist-hd">
        <div class="hist-who">
          <div class="hist-dot" style="background:${v.workerColor}"></div>
          <span class="hist-name" style="color:${v.workerColor}">${v.workerName}</span>
        </div>
        <span class="hist-date">${v.date} · ${v.time}</span>
      </div>
      ${v.isDovolena ? `
        <div style="background:#2a0d0d;border-radius:6px;padding:8px 12px;color:var(--dovolena);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800">🏖️ DOVOLENÁ — celý den</div>
      ` : `<div class="hist-blocks">
        ${v.blocks.map(b => `
          <div class="hist-block ${b.stredisko==='tridirna'?'trid':b.stredisko==='sklad'?'sklad':'opr'}" style="${b.stredisko==='sklad'?'background:#0d2a0d':''}">
            <span class="hist-stred ${b.stredisko==='tridirna'?'trid':b.stredisko==='sklad'?'':'opr'}" style="${b.stredisko==='sklad'?'color:var(--sklad)':''}">${b.stredisko==='tridirna'?'TŘÍDÍRNA':b.stredisko==='sklad'?'SKLAD':'OPRAVNA'}</span>
            <span class="hist-time">${b.od} → ${b.do}</span>
            <span class="hist-ks">${b.ks||0} ks</span>
            <span class="hist-ks">${b.ks||0} ks</span>
          </div>
          ${b.palletQty && Object.values(b.palletQty).some(v=>v>0) ? `<div style="padding:4px 8px 2px;display:flex;flex-wrap:wrap;gap:4px">
            ${PALLETS.map((p,pi)=>(b.palletQty[pi]>0?`<span style="font-size:11px;color:var(--dim);background:var(--bg3);border-radius:4px;padding:2px 7px">${p}${p==='Atypická'&&b.atypickaNote?' ('+b.atypickaNote+')':''}: ${b.palletQty[pi]}</span>`:'')).join('')}
          </div>` : ''}`).join('')}
      </div>`}
      ${v.note ? `<div class="hist-note">📝 ${v.note}</div>` : ''}
      <div class="hist-footer">
        <span class="hist-total">
          🟡 ${fmtMins(v.tridMins)} &nbsp;·&nbsp; 🔵 ${fmtMins(v.oprMins)}${v.skladMins?` &nbsp;·&nbsp; 🟢 ${fmtMins(v.skladMins)}`:''} &nbsp;·&nbsp; ⏱ <strong>${fmtMins(v.totalNet)}</strong>
        </span>
        <button class="hist-del" onclick="deleteVykaz('${v.id}')">🗑 Smazat</button>
      </div>
    </div>`).join('');
}

function deleteVykaz(id) {
  if(!confirm('Smazat tento výkaz?')) return;
  const v = getVykazy().find(v => v.id === id);
  if (v && v._id && window.deleteFromFirebase) {
    window.deleteFromFirebase(v._id);
  } else {
    vykazy = vykazy.filter(v => v.id !== id);
    localStorage.setItem('vykazy', JSON.stringify(vykazy));
    renderHistorie();
  }
  toast('🗑 Výkaz smazán');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('on'), 2600);
}

// OFFLINE SYNC
let pendingSync = JSON.parse(localStorage.getItem('vykazy_pending') || '[]');

function updateOnlineStatus() {
  document.body.classList.toggle('offline', !navigator.onLine);
  if (navigator.onLine && pendingSync.length > 0) syncPending();
}

async function syncPending() {
  const toSync = [...pendingSync];
  for (const rec of toSync) {
    try {
      const encoded = encodeURIComponent(JSON.stringify(rec));
      const img = new Image();
      img.src = SHEETS_URL + '?data=' + encoded;
      pendingSync = pendingSync.filter(r => r.id !== rec.id);
    } catch(e) { break; }
  }
  localStorage.setItem('vykazy_pending', JSON.stringify(pendingSync));
  updateSyncBadge();
}

function updateSyncBadge() {
  const b = document.getElementById('sync-pending');
  if (pendingSync.length > 0) {
    b.classList.add('on');
    b.textContent = `⟳ ${pendingSync.length}`;
  } else {
    b.classList.remove('on');
  }
}

window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => console.log('SW:', e));
}

// INIT
renderWorkers();
addBlock(); // start with one empty block
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBn4rkplA5cnQfOvTAoSVCbPcokPiTU3ag",
  authDomain: "vykazy-prace-69bb6.firebaseapp.com",
  projectId: "vykazy-prace-69bb6",
  storageBucket: "vykazy-prace-69bb6.firebasestorage.app",
  messagingSenderId: "1092719866856",
  appId: "1:1092719866856:web:10a530d3d31bdcbef86a5d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Real-time sync
const q = query(collection(db, "vykazy_prace"), orderBy("ts", "desc"));
onSnapshot(q, (snapshot) => {
  const data = [];
  snapshot.forEach(d => data.push({...d.data(), _id: d.id}));
  window._vykazy = data;
  localStorage.setItem('vykazy', JSON.stringify(data));
  // Refresh history if open
  const histScreen = document.getElementById('screen-historie');
  if (histScreen && histScreen.classList.contains('on')) renderHistorie();
});

window.saveToFirebase = async function(rec) {
  try {
    await addDoc(collection(db, "vykazy_prace"), rec);
    return true;
  } catch(e) {
    console.error('Firebase error:', e);
    return false;
  }
};

window.deleteFromFirebase = async function(id) {
  try {
    await deleteDoc(doc(db, "vykazy_prace", id));
    return true;
  } catch(e) {
    console.error('Firebase delete error:', e);
    return false;
  }
};
</script>
